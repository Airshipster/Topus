name: Quick Fix Sheet

on:
  workflow_dispatch:

jobs:
  quick-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install gspread==6.1.2 google-auth==2.35.0
      - run: python src/quick_fix_hyperlinks.py
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
