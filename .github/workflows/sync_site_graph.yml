name: Sync Site Graph

on:
  schedule:
    - cron: "20 6 1 * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-graph-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Topus
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up GitLab SSH key
        env:
          GITLAB_SSH_PRIVATE_KEY: ${{ secrets.GITLAB_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$GITLAB_SSH_PRIVATE_KEY" ]; then
            echo "GITLAB_SSH_PRIVATE_KEY secret is required for site deploy" >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$GITLAB_SSH_PRIVATE_KEY" > ~/.ssh/gitlab_deploy_key
          chmod 600 ~/.ssh/gitlab_deploy_key
          ssh-keyscan -H gitlab.com >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<'EOF'
          Host gitlab.com
            HostName gitlab.com
            User git
            IdentityFile ~/.ssh/gitlab_deploy_key
            IdentitiesOnly yes
          EOF

      - name: Sync graph data to website repo
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TOPUS_MASTER_SPREADSHEET_ID: ${{ secrets.TOPUS_MASTER_SPREADSHEET_ID }}
          GITLAB_REPO_URL: ${{ secrets.GITLAB_REPO_URL }}
          GITLAB_BRANCH: ${{ secrets.GITLAB_BRANCH }}
          GRAPH_DATA_PATH: public/scitopus-graph/data.json
          GIT_AUTHOR_NAME: ${{ secrets.GIT_AUTHOR_NAME }}
          GIT_AUTHOR_EMAIL: ${{ secrets.GIT_AUTHOR_EMAIL }}
        run: python src/sync_site_graph_to_gitlab.py
