name: Check YouTube Videos

on:
  schedule:
    - cron: '*/5 * * * *'
    - cron: '7,37 * * * *'
    - cron: '17 2 * * *'
  repository_dispatch:
    types: [topus-push]
  
  workflow_dispatch:
    inputs:
      maintenance_only:
        description: 'Only repair workbook layout/formatting; do not sync or publish'
        required: false
        default: 'false'
      unlock_only:
        description: 'Only clear publisher lock; do not sync or publish'
        required: false
        default: 'false'
      sync_only:
        description: 'Only sync subscriptions; do not publish'
        required: false
        default: 'false'
      repair_pending_only:
        description: 'Only reconcile rows that were published but stayed pending'
        required: false
        default: 'false'
      repair_video_id:
        description: 'Repair one Global Videos row by YouTube video ID'
        required: false
        default: ''
      repair_project_name:
        description: 'Project name for repair_video_id'
        required: false
        default: ''
      repair_tg_message_id:
        description: 'Telegram message ID for repair_video_id'
        required: false
        default: ''
      force_subscription_sync:
        description: 'Force subscription sync during this run'
        required: false
        default: 'false'

concurrency:
  group: topus-publisher-${{ (github.event_name == 'repository_dispatch' || github.event.schedule == '*/5 * * * *') && 'push' || 'full' }}
  cancel-in-progress: false

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Wake Apps Script callback
      run: |
        curl -fsSL "https://script.google.com/macros/s/AKfycbwqySnqlEYAMTTQNkcUy9RU-B6UkikW9o-v5lzLxtthnpOE_52XRZThoe2b1xjIj1Zm/exec" -o /dev/null || true
    
    - name: Run main script
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        PYTHONUNBUFFERED: '1'
        TOPUS_MAINTENANCE_ONLY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.maintenance_only == 'true' }}
        TOPUS_UNLOCK_ONLY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.unlock_only == 'true' }}
        TOPUS_REPAIR_PENDING_ONLY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.repair_pending_only == 'true' }}
        TOPUS_REPAIR_VIDEO_ID: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.repair_video_id || '' }}
        TOPUS_REPAIR_PROJECT_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.repair_project_name || '' }}
        TOPUS_REPAIR_TG_MESSAGE_ID: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.repair_tg_message_id || '' }}
        TOPUS_FORCE_SUBSCRIPTION_SYNC: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.force_subscription_sync == 'true') || github.event.schedule == '17 2 * * *' || github.event.client_payload.force_subscription_sync == 'true' || (github.event_name == 'repository_dispatch' && github.event.client_payload.video_id == '' && github.event.client_payload.channel_id == '') }}
        TOPUS_SYNC_ONLY: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.sync_only == 'true') || github.event.schedule == '17 2 * * *' }}
        TOPUS_PUSH_ONLY: ${{ github.event.schedule == '*/5 * * * *' || (github.event_name == 'repository_dispatch' && github.event.client_payload.video_id != '' && github.event.client_payload.channel_id != '') }}
      run: |
        python src/main.py
