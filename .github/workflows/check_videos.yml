name: Check YouTube Videos

on:
  schedule:
    - cron: '*/5 * * * *'
    - cron: '7,37 * * * *'
    - cron: '17 2 * * *'
  repository_dispatch:
    types: [topus-push]
  
  workflow_dispatch:
    inputs:
      maintenance_only:
        description: 'Only repair workbook layout/formatting; do not sync or publish'
        required: false
        default: 'false'

concurrency:
  group: topus-publisher
  cancel-in-progress: false

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Wake Apps Script callback
      run: |
        curl -fsSL "https://script.google.com/macros/s/AKfycbwqySnqlEYAMTTQNkcUy9RU-B6UkikW9o-v5lzLxtthnpOE_52XRZThoe2b1xjIj1Zm/exec" -o /dev/null
    
    - name: Run main script
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        PYTHONUNBUFFERED: '1'
        TOPUS_MAINTENANCE_ONLY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.maintenance_only == 'true' }}
        TOPUS_FORCE_SUBSCRIPTION_SYNC: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.maintenance_only != 'true') || github.event.schedule == '17 2 * * *' || github.event.client_payload.force_subscription_sync == 'true' || (github.event_name == 'repository_dispatch' && github.event.client_payload.video_id == '' && github.event.client_payload.channel_id == '') }}
        TOPUS_SYNC_ONLY: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.maintenance_only != 'true') || github.event.schedule == '17 2 * * *' || github.event.client_payload.force_subscription_sync == 'true' || (github.event_name == 'repository_dispatch' && github.event.client_payload.video_id == '' && github.event.client_payload.channel_id == '') }}
        TOPUS_PUSH_ONLY: ${{ github.event.schedule == '*/5 * * * *' || (github.event_name == 'repository_dispatch' && github.event.client_payload.video_id != '' && github.event.client_payload.channel_id != '') }}
      run: |
        python src/main.py
