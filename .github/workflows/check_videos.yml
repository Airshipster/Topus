name: Check YouTube Videos

on:
  schedule:
    - cron: '*/5 * * * *'
    - cron: '17 2 * * *'
  repository_dispatch:
    types: [topus-push]
  
  workflow_dispatch:

concurrency:
  group: topus-publisher
  cancel-in-progress: false

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run main script
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        TOPUS_FORCE_SUBSCRIPTION_SYNC: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '17 2 * * *' || github.event.client_payload.force_subscription_sync == 'true' }}
      run: |
        python src/main.py
