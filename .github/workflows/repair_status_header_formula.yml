name: Repair Status Header Formula

on:
  workflow_dispatch:
    inputs:
      repair:
        description: 'Write formula into Global videos status header'
        required: false
        default: 'true'

jobs:
  repair-status-header-formula:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Repair formula
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        TOPUS_REPAIR: ${{ github.event.inputs.repair }}
        PYTHONUNBUFFERED: '1'
      run: |
        python src/repair_status_header_formula.py
