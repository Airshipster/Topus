name: Sync Bot Cloudflare

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      inspect_revision:
        description: 'Read-only inspect old bot sheet revision'
        required: false
        default: 'false'
      revision_before:
        description: 'RFC3339 timestamp for old revision lookup'
        required: false
        default: '2026-05-28T23:50:00Z'

jobs:
  sync-bot-cloudflare:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync bot state with Cloudflare
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TOPUS_WORKER_URL: ${{ secrets.TOPUS_WORKER_URL }}
          TOPUS_WORKER_ADMIN_SECRET: ${{ secrets.TOPUS_WORKER_ADMIN_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: '8460cfa72309d5c869775d6c38ca41dd'
          CLOUDFLARE_WORKER_SCRIPT_NAME: 'topus-telegram-subscriptions'
          TOPUS_REVISION_BEFORE: ${{ github.event.inputs.revision_before }}
        run: |
          if [ "${{ github.event.inputs.inspect_revision }}" = "true" ]; then
            python src/inspect_bot_sheet_revision.py
          else
            python src/sync_bot_state_sheet.py
          fi
