name: Repair Stream Archive Dates

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview changes without writing to Sheets'
        required: false
        default: 'false'

concurrency:
  group: topus-publisher
  cancel-in-progress: false

jobs:
  repair-stream-archive-dates:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Repair stream archive dates
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        TOPUS_DRY_RUN: ${{ github.event.inputs.dry_run }}
        PYTHONUNBUFFERED: '1'
      run: |
        python src/repair_stream_archive_dates.py
